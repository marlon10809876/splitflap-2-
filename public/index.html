<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Split-Flap Steuerung</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      text-align: center;
    }

    .app {
      max-width: 520px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      margin-top: 10px;
      font-size: 28px;
    }

    .display {
      margin: 28px auto;
      width: 170px;
      height: 220px;
      background: #050505;
      border: 2px solid #333;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 92px;
      font-weight: bold;
      box-shadow: 0 0 30px rgba(0,0,0,0.8);
    }

    .card {
      background: #1b1b1b;
      border: 1px solid #2d2d2d;
      border-radius: 16px;
      padding: 18px;
      margin: 16px 0;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #ccc;
      font-size: 14px;
    }

    input {
      width: 90%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 20px;
      text-align: center;
      margin-bottom: 12px;
    }

    button {
      width: 95%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 6px;
    }

    .send {
      background: #42d66b;
      color: #071007;
    }

    .cal {
      background: #f5b942;
      color: #171000;
    }

    .refresh {
      background: #4da3ff;
      color: #06111e;
    }

    .quick {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-top: 12px;
    }

    .quick button {
      width: 100%;
      margin: 0;
      background: #2c2c2c;
      color: white;
    }

    .status {
      background: #000;
      color: #00ff88;
      padding: 14px;
      border-radius: 12px;
      text-align: left;
      white-space: pre-wrap;
      min-height: 90px;
      font-family: monospace;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <main class="app">
    <h1>Split-Flap Steuerung</h1>

    <div class="display" id="display">?</div>

    <section class="card">
      <label for="magnetInput">Zeichen am Magnetpunkt</label>
      <input id="magnetInput" value="_" maxlength="5" />
      <button class="cal" onclick="calibrate()">Kalibrieren</button>
    </section>

    <section class="card">
      <label for="charInput">Zielzeichen</label>
      <input id="charInput" value="A" maxlength="1" />
      <button class="send" onclick="sendChar()">Senden</button>

      <div class="quick">
        <button onclick="quickSend('A')">A</button>
        <button onclick="quickSend('B')">B</button>
        <button onclick="quickSend('C')">C</button>
        <button onclick="quickSend('_')">Leer</button>
      </div>
    </section>

    <section class="card">
      <button class="refresh" onclick="loadStatus()">Status laden</button>
      <pre class="status" id="status">Bereit.</pre>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
